databases:
  - name: thelensdispatch-db
    databaseName: thelensdispatch
    user: admin
    plan: starter # Change to higher plan if needed for production
    region: ohio

  - name: thelensdispatch-redis
    plan: free
    region: ohio
    maxmemoryPolicy: noeviction

services:
  - type: web
    name: thelensdispatch-web
    env: node
    plan: starter
    region: ohio
    buildCommand: npm install && npm run build
    startCommand: npx drizzle-kit push && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thelensdispatch-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: thelensdispatch-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false

  - type: worker
    name: thelensdispatch-worker
    env: node
    plan: starter
    region: ohio
    buildCommand: npm install && npm run build
    startCommand: npm run worker:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: thelensdispatch-db
          property: connectionString
      - key: REDIS_URL
        fromDatabase:
          name: thelensdispatch-redis
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
