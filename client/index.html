<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1c1c1a" />
    <meta name="msapplication-TileColor" content="#1c1c1a" />

    <!-- Primary Meta -->
    <title>The Lens Dispatch — See Every Side of Every Story</title>
    <meta name="description" content="The Lens Dispatch shows you how the same story is reported by left, centre and right media — simultaneously, transparently, and free." />

    <!-- Open Graph -->
    <meta property="og:title" content="The Lens Dispatch — See Every Side" />
    <meta property="og:description" content="See every side of every story. Free, always." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="The Lens Dispatch" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Lens Dispatch" />
    <meta name="twitter:description" content="See every side of every story — left, center, and right coverage, side by side." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Google Fonts — Preconnect first, then load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font preloads for critical fonts (reduces LCP) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&display=swap" rel="stylesheet" />

    <!-- DNS Prefetch for image CDNs -->
    <link rel="dns-prefetch" href="https://images.weserv.nl" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://cdn.pixabay.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
