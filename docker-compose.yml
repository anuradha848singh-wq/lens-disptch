version: '3.8'

services:
  postgres:
    image: ankane/pgvector:v0.5.1 # Specialized image with pgvector pre-installed
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
      - POSTGRES_DB=thelensdispatch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-redisdevpass}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/thelensdispatch
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379
      - EMBEDDING_SERVICE_URL=http://embeddings:8001
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: npm run worker:prod
    environment:
      - DATABASE_URL=postgresql://admin:${POSTGRES_PASSWORD:-devpassword}@postgres:5432/thelensdispatch
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379
      - EMBEDDING_SERVICE_URL=http://embeddings:8001
      - NODE_ENV=production
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:

